<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn Bot</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f5f5f5;
    }

    .container {
      width: 90%;
      max-width: 400px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      background: #333;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #555;
    }

    button:disabled {
      background: #999;
      cursor: not-allowed;
    }

    /* POPUP MODAL */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      width: 80%;
      max-width: 300px;
    }

    .modal-content p {
      margin-bottom: 15px;
      font-size: 16px;
    }

    .close-btn {
      padding: 10px 20px;
      border: none;
      background: #333;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    .close-btn:hover {
      background: #555;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>LinkedIn Bot</h2>

    <form id="myForm">
      <input type="text" id="inputData" placeholder="Enter your idea..." required />
      <button type="submit">Generate</button>
    </form>
  </div>

  <!-- POPUP -->
  <div class="modal" id="popup">
    <div class="modal-content">
      <p id="popupMessage"></p>
      <button class="close-btn" onclick="closePopup()">OK</button>
    </div>
  </div>

  <script>
    const form = document.getElementById("myForm");
    const popup = document.getElementById("popup");
    const popupMessage = document.getElementById("popupMessage");
    const button = form.querySelector("button");

    function showPopup(message) {
      popupMessage.innerText = message;
      popup.style.display = "flex";
    }

    function closePopup() {
      popup.style.display = "none";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const value = document.getElementById("inputData").value.trim();
      if (!value) return;

      button.disabled = true;
      button.innerText = "Sending...";

      try {
        const response = await fetch("https://hook.eu1.make.com/9d1xspsfqmg8j0siona5x1h7vyuwr7cz", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            text: value
          })
        });

        if (response.ok) {
          showPopup("✅ Sent successfully!");
          form.reset();
        } else {
          showPopup("❌ Failed to send request.");
        }

      } catch (error) {
        showPopup("❌ Error occurred. Check console.");
        console.error(error);
      }

      button.disabled = false;
      button.innerText = "Generate";
    });
  </script>

</body>
</html>
